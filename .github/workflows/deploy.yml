name: Deploy to GitHub Pages

on:
  # Deploy only after Tests workflow succeeds on main
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # Only deploy if tests passed (or manual trigger)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: extractions/setup-just@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Pack typeshed
        run: uv run scripts/pack-typeshed.py

      - name: Pack board stubs
        run: uv run scripts/pack-stubs.py

      - name: Build worker
        run: npx webpack --mode production

      - name: Verify build artifacts
        run: |
          set -euo pipefail
          if [ ! -f dist/pyright_worker.js ] || [ ! -s dist/pyright_worker.js ]; then
            echo "ERROR: dist/pyright_worker.js missing or empty"
            exit 1
          fi
          echo "pyright_worker.js: $(stat -c%s dist/pyright_worker.js) bytes"

      - name: Prepare deploy directory
        run: |
          set -euo pipefail
          mkdir -p deploy
          cp -r src/* deploy/
          cp dist/pyright_worker.js deploy/
          cp -r assets deploy/

      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
