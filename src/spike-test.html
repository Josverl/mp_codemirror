<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyright Worker Spike Test</title>
    <style>
        body { font-family: monospace; margin: 2em; background: #1a1a2e; color: #e0e0e0; }
        h1 { color: #00d4aa; }
        .status { padding: 0.5em 1em; margin: 0.5em 0; border-radius: 4px; }
        .pending { background: #333; }
        .ok { background: #1a4d1a; color: #4caf50; }
        .fail { background: #4d1a1a; color: #f44336; }
        .info { background: #1a1a4d; color: #64b5f6; }
        pre { background: #0d0d1a; padding: 1em; border-radius: 4px; overflow-x: auto; }
        #log { max-height: 400px; overflow-y: auto; }
        button { background: #00d4aa; color: #1a1a2e; border: none; padding: 0.5em 1.5em; 
                 border-radius: 4px; cursor: pointer; font-size: 1em; margin: 0.5em 0; }
        button:hover { background: #00ffcc; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>Pyright Worker — Feasibility Spike</h1>
    <p>Tests whether Pyright can run in a Web Worker and produce diagnostics.</p>
    
    <button id="runBtn" onclick="runSpike()">Run Spike Test</button>
    
    <div id="steps">
        <div id="step-load" class="status pending">1. Load worker script</div>
        <div id="step-init" class="status pending">2. Initialize Pyright + ZenFS</div>
        <div id="step-lsp" class="status pending">3. Send LSP initialize</div>
        <div id="step-open" class="status pending">4. Open document with type error</div>
        <div id="step-diag" class="status pending">5. Receive diagnostic</div>
    </div>
    
    <h3>Measurements</h3>
    <pre id="measurements">Waiting...</pre>
    
    <h3>Log</h3>
    <pre id="log"></pre>

    <script type="module">
        const log = document.getElementById('log');
        const measurements = document.getElementById('measurements');
        
        function addLog(msg) {
            const ts = new Date().toISOString().substring(11, 23);
            log.textContent += `[${ts}] ${msg}\n`;
            log.scrollTop = log.scrollHeight;
        }
        
        function setStep(id, ok, msg) {
            const el = document.getElementById(id);
            el.className = `status ${ok ? 'ok' : 'fail'}`;
            el.textContent = msg || el.textContent;
        }
        
        window.runSpike = async function() {
            const btn = document.getElementById('runBtn');
            btn.disabled = true;
            
            const times = {};
            const t0 = performance.now();
            
            try {
                // Step 1: Load worker
                addLog('Creating Web Worker from dist/worker.js...');
                const worker = new Worker('./dist/worker.js');
                
                // Wait for serverLoaded
                const loaded = await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('Worker load timeout (10s)')), 10000);
                    worker.onmessage = (e) => {
                        if (e.data.type === 'serverLoaded') {
                            clearTimeout(timeout);
                            resolve(e.data);
                        }
                    };
                    worker.onerror = (e) => {
                        clearTimeout(timeout);
                        reject(new Error(`Worker error: ${e.message}`));
                    };
                });
                
                times.workerLoad = performance.now() - t0;
                setStep('step-load', true, `1. Worker loaded (${times.workerLoad.toFixed(0)}ms)`);
                addLog(`Worker loaded in ${times.workerLoad.toFixed(0)}ms`);
                
                // Step 2: Initialize (send initServer)
                const t1 = performance.now();
                addLog('Sending initServer (no custom stubs for spike)...');
                
                worker.postMessage({
                    type: 'initServer',
                    userFiles: {},
                    typeshedFallback: false,
                });
                
                const initResult = await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('Init timeout (30s)')), 30000);
                    worker.onmessage = (e) => {
                        if (e.data.type === 'serverInitialized') {
                            clearTimeout(timeout);
                            resolve(e.data);
                        } else if (e.data.type === 'serverError') {
                            clearTimeout(timeout);
                            reject(new Error(e.data.error));
                        }
                    };
                });
                
                times.init = performance.now() - t1;
                setStep('step-init', true, `2. Pyright initialized (${times.init.toFixed(0)}ms)`);
                addLog(`Pyright initialized in ${times.init.toFixed(0)}ms`);
                
                // Step 3: Send LSP initialize request
                const t2 = performance.now();
                addLog('Sending LSP initialize request...');
                
                let msgId = 1;
                const initializeRequest = {
                    jsonrpc: '2.0',
                    id: msgId++,
                    method: 'initialize',
                    params: {
                        processId: null,
                        rootUri: 'file:///workspace',
                        capabilities: {
                            textDocument: {
                                publishDiagnostics: {
                                    relatedInformation: true,
                                },
                                completion: {
                                    completionItem: {
                                        snippetSupport: false,
                                    },
                                },
                                hover: {
                                    contentFormat: ['plaintext'],
                                },
                            },
                        },
                        workspaceFolders: [
                            { uri: 'file:///workspace', name: 'workspace' }
                        ],
                    },
                };
                
                worker.postMessage(initializeRequest);
                
                const initResponse = await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('LSP init timeout (15s)')), 15000);
                    const handler = (e) => {
                        const data = e.data;
                        addLog(`← ${JSON.stringify(data).substring(0, 200)}`);
                        if (data.id === 1 && data.result) {
                            clearTimeout(timeout);
                            worker.removeEventListener('message', handler);
                            resolve(data);
                        }
                    };
                    worker.addEventListener('message', handler);
                });
                
                times.lspInit = performance.now() - t2;
                setStep('step-lsp', true, `3. LSP initialized (${times.lspInit.toFixed(0)}ms)`);
                addLog(`LSP handshake in ${times.lspInit.toFixed(0)}ms`);
                
                // Send initialized notification
                worker.postMessage({
                    jsonrpc: '2.0',
                    method: 'initialized',
                    params: {},
                });
                
                // Step 4: Open document with a type error
                const t3 = performance.now();
                const testCode = 'x: int = "hello"  # type error\nprint(x)\n';
                addLog(`Opening document with type error: ${testCode.trim()}`);
                
                worker.postMessage({
                    jsonrpc: '2.0',
                    method: 'textDocument/didOpen',
                    params: {
                        textDocument: {
                            uri: 'file:///workspace/main.py',
                            languageId: 'python',
                            version: 1,
                            text: testCode,
                        },
                    },
                });
                
                setStep('step-open', true, '4. Document opened with type error');
                
                // Step 5: Wait for diagnostics
                addLog('Waiting for publishDiagnostics notification...');
                
                const diagnostics = await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('Diagnostics timeout (30s)')), 30000);
                    const handler = (e) => {
                        const data = e.data;
                        if (data.method === 'textDocument/publishDiagnostics') {
                            addLog(`← diagnostics: ${JSON.stringify(data.params?.diagnostics?.length)} issues`);
                            if (data.params?.diagnostics?.length > 0) {
                                clearTimeout(timeout);
                                worker.removeEventListener('message', handler);
                                resolve(data.params);
                            }
                        } else {
                            addLog(`← ${data.method || 'response'}: ${JSON.stringify(data).substring(0, 150)}`);
                        }
                    };
                    worker.addEventListener('message', handler);
                });
                
                times.diagnostic = performance.now() - t3;
                times.total = performance.now() - t0;
                
                setStep('step-diag', true, 
                    `5. Diagnostic received! (${times.diagnostic.toFixed(0)}ms) — ${diagnostics.diagnostics.length} issue(s)`);
                addLog(`\nDiagnostics:\n${JSON.stringify(diagnostics.diagnostics, null, 2)}`);
                
                // Show measurements
                measurements.textContent = [
                    `Worker load:        ${times.workerLoad.toFixed(0)}ms`,
                    `Pyright init:       ${times.init.toFixed(0)}ms`,
                    `LSP handshake:      ${times.lspInit.toFixed(0)}ms`,
                    `Time to diagnostic: ${times.diagnostic.toFixed(0)}ms`,
                    `Total:              ${times.total.toFixed(0)}ms`,
                    ``,
                    `Budget: < 5000ms total`,
                    `Result: ${times.total < 5000 ? 'PASS' : 'OVER BUDGET'}`,
                ].join('\n');
                
                addLog(`\n=== SPIKE PASSED === Total: ${times.total.toFixed(0)}ms`);
                
            } catch (err) {
                addLog(`ERROR: ${err.message}`);
                measurements.textContent = `FAILED: ${err.message}`;
                
                // Mark current step as failed
                document.querySelectorAll('.pending').forEach(el => {
                    el.className = 'status fail';
                });
            }
            
            btn.disabled = false;
        };
    </script>
</body>
</html>
