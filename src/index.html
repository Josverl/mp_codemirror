<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMirror Python Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>CodeMirror 6 MicroPython Editor</h1>
        <div class="controls">
            <div class="board-selector">
                <label for="boardSelect">Board:</label>
                <select id="boardSelect" aria-label="Select MicroPython board">
                    <option value="">Loading...</option>
                </select>
                <span id="boardLoading" class="loading-indicator" hidden>⏳</span>
            </div>
            <button id="themeToggle" aria-label="Toggle dark/light theme">🌓 Toggle Theme</button>
            <button id="typeCheckBtn" aria-label="Run type checking with Pyright">🔍 Type Check</button>
            <button id="clearBtn" aria-label="Clear editor content">Clear</button>
            <div class="sample-selector">
                <select id="sampleSelect" aria-label="Select example file">
                    <option value="">Select Example...</option>
                </select>
                <button id="loadSampleBtn" aria-label="Load selected sample">Load</button>
            </div>
        </div>
    </header>

    <main>
        <div id="editor-container"></div>
    </main>

    <footer>
        <p>CodeMirror 6 MicroPython Editor | <a href="https://codemirror.net/6/" target="_blank" rel="noopener">CodeMirror
                Docs</a></p>
    </footer>

    <!-- Import map for CodeMirror modules - using esm.sh with explicit shared dependency versions -->
    <script type="importmap">
    {
        "imports": {
            "codemirror": "https://esm.sh/codemirror@6.0.2?deps=@codemirror/state@6.6.0,@codemirror/view@6.41.1,@codemirror/language@6.12.3,@codemirror/autocomplete@6.20.1,@lezer/common@1.5.2",
            "@codemirror/lang-python": "https://esm.sh/@codemirror/lang-python@6.2.1?deps=@codemirror/autocomplete@6.20.1,@codemirror/language@6.12.3,@codemirror/state@6.6.0,@codemirror/view@6.41.1,@lezer/common@1.5.2,@lezer/python@1.1.18",
            "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.20.1?deps=@codemirror/language@6.12.3,@codemirror/state@6.6.0,@codemirror/view@6.41.1,@lezer/common@1.5.2",
            "@codemirror/lint": "https://esm.sh/@codemirror/lint@6.9.5?deps=@codemirror/state@6.6.0,@codemirror/view@6.41.1",
            "@codemirror/state": "https://esm.sh/@codemirror/state@6.6.0",
            "@codemirror/view": "https://esm.sh/@codemirror/view@6.41.1?deps=@codemirror/state@6.6.0"
        }
    }
    </script>

    <!-- Main application script -->
    <script type="module" src="app.js"></script>
</body>

</html>
