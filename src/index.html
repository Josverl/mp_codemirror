<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMirror Python Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>CodeMirror 6 Python Editor</h1>
        <div class="controls">
            <button id="themeToggle" aria-label="Toggle dark/light theme">🌓 Toggle Theme</button>
            <button id="clearBtn" aria-label="Clear editor content">Clear</button>
            <div class="sample-selector">
                <select id="sampleSelect" aria-label="Select example file">
                    <option value="">Select Example...</option>
                </select>
                <button id="loadSampleBtn" aria-label="Load selected sample">Load</button>
            </div>
        </div>
    </header>

    <main>
        <div id="editor-container"></div>
    </main>

    <footer>
        <p>CodeMirror 6 Python Editor | <a href="https://codemirror.net/6/" target="_blank" rel="noopener">CodeMirror
                Docs</a></p>
    </footer>

    <!-- Import map for CodeMirror modules - using esm.sh with explicit shared dependency versions -->
    <script type="importmap">
    {
        "imports": {
            "codemirror": "https://esm.sh/codemirror@6.0.1?deps=@codemirror/state@6.4.1,@codemirror/view@6.35.0,@codemirror/language@6.10.6,@codemirror/autocomplete@6.18.3,@lezer/common@1.2.3",
            "@codemirror/lang-python": "https://esm.sh/@codemirror/lang-python@6.1.6?deps=@codemirror/autocomplete@6.18.3,@codemirror/language@6.10.6,@codemirror/state@6.4.1,@codemirror/view@6.35.0,@lezer/common@1.2.3,@lezer/python@1.1.16",
            "@codemirror/lint": "https://esm.sh/@codemirror/lint@6.8.4?deps=@codemirror/state@6.4.1,@codemirror/view@6.35.0",
            "@codemirror/lsp-client": "https://esm.sh/@codemirror/lsp-client@0.1.0?deps=@codemirror/state@6.4.1,@codemirror/view@6.35.0,@codemirror/language@6.10.6,@codemirror/lint@6.8.4,@codemirror/autocomplete@6.18.3"
        }
    }
    </script>

    <!-- Main application script -->
    <script type="module" src="app.js"></script>
</body>

</html>
