<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeMirror Python Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>CodeMirror 6 Python Editor</h1>
        <div class="controls">
            <button id="themeToggle" aria-label="Toggle dark/light theme">🌓 Toggle Theme</button>
            <button id="clearBtn" aria-label="Clear editor content">Clear</button>
            <button id="getSampleBtn" aria-label="Load sample code">Load Sample</button>
        </div>
    </header>
    
    <main>
        <div id="editor-container"></div>
    </main>
    
    <footer>
        <p>CodeMirror 6 Python Editor | <a href="https://codemirror.net/6/" target="_blank" rel="noopener">CodeMirror Docs</a></p>
    </footer>

    <!-- Import map for CodeMirror modules - using esm.sh with pinned versions -->
    <script type="importmap">
    {
        "imports": {
            "codemirror": "https://esm.sh/codemirror@6.0.1?pin=v135",
            "@codemirror/lang-python": "https://esm.sh/@codemirror/lang-python@6.1.6?pin=v135"
        }
    }
    </script>
    
    <!-- Main application script -->
    <script type="module" src="app.js"></script>
</body>
</html>
