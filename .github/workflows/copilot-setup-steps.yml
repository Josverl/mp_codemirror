name: Setup Copilot Agent Environment

on:
    workflow_dispatch:

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 1

            - name: Install uv
              uses: astral-sh/setup-uv@v8.1.0
              with:
                  enable-cache: true
                  cache-dependency-glob: "pyproject.toml"

            - uses: extractions/setup-just@v4

            # Step 4: Set up Python
            - name: Set up Python
              run: uv python install

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 'lts/*'

            - name: Install project dependencies
              run: |
                  echo "📦 Installing dependencies with uv..."
                  uv sync --extra test

            # Step 8: Install MicroPython stubs
            - name: Install MicroPython stubs
              run: |
                  echo "📦 Installing MicroPython stubs..."
                  uv pip install -r pyproject.toml --extra stubs --target typings 

            # Step 9: Verify setup
            - name: Verify environment
              run: |
                  echo "✅ Environment Setup Complete"
                  echo ""
                  echo "📍 UV Version:"
                  uv --version
                  echo ""
                  echo "📍 Python Version:"
                  uv run python --version
                  echo ""
                  echo "📍 Installed Packages:"
                  uv pip list
                  echo ""
                  echo "📍 Submodule Status:"
                  echo "(no submodules)"
                  echo ""
                  echo "📍 MicroPython Stubs:"
                  ls -la typings/ 2>/dev/null || echo "No typings directory yet"
                  echo ""
                  echo "📍 Node.js Version:"
                  node --version
                  echo ""
                  echo "📍 NPM Version:"
                  npm --version

            # Step 10: Cache environment for faster subsequent runs
            - name: Cache environment
              uses: actions/cache@v4
              with:
                  path: |
                      .venv
                      typings
                      ~/.cache/uv
                  key: ${{ runner.os }}-env-${{ hashFiles('pyproject.toml', 'uv.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-env-
