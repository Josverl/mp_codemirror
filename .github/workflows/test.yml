name: Tests

on:
  push:
    branches: [main, "feat/*"]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    # Tier 0: Pure Python, no browser, no server. Fast.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run unit tests
        run: uv run pytest -m unit -v || test $? -eq 5

  security-audit:
    # Tier 0: Check npm dependencies for known vulnerabilities.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        run: npm audit --omit=dev || true

  browser-tests:
    # Tier 1+2: Playwright suites against a 4-browser matrix.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        browser: [chromium, firefox, webkit, msedge]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci --ignore-scripts

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-
            ${{ runner.os }}-playwright-

      - name: Build worker
        run: npx webpack --mode production

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --extra test

      - name: Install Playwright browsers
        run: uv run playwright install ${{ matrix.browser }} --with-deps

      - name: Run editor tests
        run: uv run pytest -m editor -v --browser-name "${{ matrix.browser }}"

      - name: Run worker tests
        run: uv run pytest -m worker -v --browser-name "${{ matrix.browser }}"
